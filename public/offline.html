<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline — SymbioAI</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(circle at top, rgba(16, 185, 129, 0.15), transparent 40%), linear-gradient(135deg, #031427 0%, #061b2c 55%, #020812 100%);
      color: #f1f5f9;
      display: flex;
      align-items: center;
      justify-content: center;
      min-h: 100vh;
      text-align: center;
    }
    .container {
      max-width: 400px;
      padding: 40px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px border rgba(255, 255, 255, 0.1);
      border-radius: 32px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      border-radius: 24px;
      background: rgba(16, 185, 129, 0.15);
      color: #34d399;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      animation: pulse 2s infinite;
    }
    h1 {
      font-size: 24px;
      font-weight: 800;
      margin: 0 0 12px;
      color: #ffffff;
    }
    p {
      font-size: 14px;
      color: #94a3b8;
      line-height: 1.6;
      margin: 0 0 24px;
    }
    button {
      background: linear-gradient(135deg, #10b981 0%, #06b6d4 100%);
      color: #031427;
      border: none;
      padding: 12px 28px;
      font-size: 14px;
      font-weight: 700;
      border-radius: 16px;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.05); opacity: 0.8; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">⚡</div>
    <h1>Connection Interrupted</h1>
    <p>SymbioAI command network is offline. Check your internet connection or local network interfaces to re-establish secure enterprise telemetry.</p>
    <button onclick="window.location.reload()">Retry Connection</button>
  </div>
</body>
</html>
