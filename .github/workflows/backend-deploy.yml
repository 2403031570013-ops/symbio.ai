name: Deploy Backend from GHCR

on:
  workflow_run:
    workflows: ["Build and Push Backend to GHCR"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and run container
        run: |
          docker pull ghcr.io/${{ github.repository }}/symbioai-backend:latest
          docker run -d \
            --name symbioai-backend \
            -p 8000:8000 \
            -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
            -e SECRET_KEY=${{ secrets.SECRET_KEY }} \
            -e CORS_ORIGINS=${{ secrets.CORS_ORIGINS }} \
            ghcr.io/${{ github.repository }}/symbioai-backend:latest

      - name: Health check
        run: |
          sleep 10
          curl -f http://localhost:8000/health || exit 1
